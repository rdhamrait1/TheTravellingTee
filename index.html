<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Travelling Tee — Mobile Golf Simulator | Lower Mainland &amp; Fraser Valley</title>
<meta name="description" content="Mobile golf simulator rental serving the Lower Mainland and Fraser Valley. Pro launch monitor, HD projection, 30,000+ courses. We bring the green to your event." />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #0A0E0B; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const LOGO = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
const PIN = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";

const Eyebrow = ({ children }) => <div className="eyebrow reveal">{children}</div>;

const InstaIcon = ({ size = 20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
  </svg>
);

function TravellingTee() {
  const [activeTab, setActiveTab] = useState('home');
  const [openFaq, setOpenFaq] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [formStatus, setFormStatus] = useState('');
  const [form, setForm] = useState({ name: '', email: '', phone: '', eventType: '', date: '', message: '' });
  const rootRef = useRef(null);

  const nav = [
    { id: 'home', label: 'Home' },
    { id: 'events', label: 'Events' },
    { id: 'how', label: 'How It Works' },
    { id: 'pricing', label: 'Pricing' },
    { id: 'gallery', label: 'Gallery' },
    { id: 'faq', label: 'FAQ' },
    { id: 'contact', label: 'Contact' },
  ];

  const go = (id) => { setActiveTab(id); setMenuOpen(false); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

  const handleSubmit = async () => {
    if (!form.name || !form.email) { setFormStatus('Please add your name and email so we can reach you back.'); return; }
    setFormStatus('Sending...');
    try {
      const res = await fetch('https://formspree.io/f/xyzwvupt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(form),
      });
      if (res.ok) {
        setFormStatus("Thanks, we've got it and will be in touch shortly.");
        setForm({ name: '', email: '', phone: '', eventType: '', date: '', message: '' });
      } else setFormStatus('Something went wrong. Email us at info@thetravellingtee.com.');
    } catch { setFormStatus('Something went wrong. Email us at info@thetravellingtee.com.'); }
  };

  // Scroll reveal
  useEffect(() => {
    const els = rootRef.current ? rootRef.current.querySelectorAll('.reveal') : [];
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [activeTab]);

  const Home = () => (
    <div>
      <section className="hero">
        <div className="hero-glow" />
        <div className="wrap hero-inner">
          <img src={LOGO} alt="The Travelling Tee" className="hero-logo reveal" />
          <div className="eyebrow reveal">Lower Mainland &middot; Fraser Valley</div>
          <h1 className="display reveal">No tee time? No problem.<br /><span className="ital">We come to you.</span></h1>
          <p className="lead reveal">
            We roll up with a full simulator setup. Pro launch monitor, HD projection, over 30,000 courses. Then
            we turn your event into something people actually remember. You bring the room. We bring the green.
          </p>
          <div className="hero-cta reveal">
            <button className="btn-primary" onClick={() => go('contact')}>Request a Booking</button>
            <button className="btn-ghost" onClick={() => go('how')}>See how it works</button>
          </div>
          <div className="readout reveal">
            {[['30,000+', 'Courses to play'], ['Included', 'Tent, operator, teardown'], ['HD', 'Projection and launch monitor']].map(([n, l]) => (
              <div className="stat" key={l}>
                <div className="stat-num">{n}</div>
                <div className="stat-label">{l}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="band">
        <div className="wrap">
          <Eyebrow>What you get</Eyebrow>
          <h2 className="display sec-title reveal">A full course, packed into a tent.</h2>
          <div className="grid-4">
            {[
              ['Pro launch monitor', 'A pro grade monitor and HD projection that reads every shot. Ball speed, carry, the works.'],
              ['30,000+ courses', 'Tee off at famous courses around the world without leaving your backyard.'],
              ['Tent and setup', 'We bring the tent and the entire rig. You provide power and a bit of space.'],
              ['Operator on site', 'One of us stays for the whole booking to run things and keep your guests swinging.'],
            ].map(([t, d], i) => (
              <div className="card reveal" key={t} style={{ transitionDelay: `${i * 70}ms` }}>
                <div className="card-index">{String(i + 1).padStart(2, '0')}</div>
                <h3 className="card-title">{t}</h3>
                <p className="muted">{d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="band band-turf">
        <div className="wrap split">
          <div>
            <Eyebrow>Why book us</Eyebrow>
            <h2 className="display sec-title reveal">Effortless for you.<br />Memorable for them.</h2>
          </div>
          <div className="reveal">
            <p className="body-lg">
              We handle the heavy lifting so you can enjoy your own event. We set everything up, run it through
              the night, and pack it all down when it's done. Whether it's a corporate party, wedding, birthday,
              or backyard hang, it's the kind of thing guests crowd around.
            </p>
            <p className="muted" style={{ marginTop: '1.25rem' }}>
              Based in the Fraser Valley and serving the Lower Mainland. A little outside that? Ask us.
            </p>
          </div>
        </div>
      </section>
    </div>
  );

  const Events = () => {
    const events = [
      ['Corporate Events', 'Team building, client entertainment, and holiday parties, all with a competitive edge that gets people talking.', true],
      ['Weddings', 'Give guests something to do between the big moments. It quietly becomes the highlight of the reception.', false],
      ['Birthdays', 'Works for kids, adults, and everyone in between. An easy way to make the day feel special.', false],
      ['Backyard Gatherings', 'Turn the backyard into a golf lounge for an afternoon or a long summer evening.', false],
      ['Tournaments', 'Closest to the pin, longest drive, or bracket play. Run a real contest with friends or coworkers.', false],
      ['Private Parties', 'Any occasion that could use a little friendly competition and a lot of good photos.', false],
    ];
    return (
      <section className="band page">
        <div className="wrap">
          <Eyebrow>Where we show up</Eyebrow>
          <h2 className="display page-title reveal">Events we do.</h2>
          <div className="grid-3">
            {events.map(([t, d, feat], i) => (
              <div className={`event-card reveal${feat ? ' feat' : ''}`} key={t} style={{ transitionDelay: `${i * 60}ms` }}>
                {feat && <span className="tag">Most requested</span>}
                <h3 className="event-title">{t}</h3>
                <p className="muted">{d}</p>
                <button className="link-cta" onClick={() => go('contact')}>Book this &rarr;</button>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  };

  const How = () => {
    const steps = [
      ['Reach out', 'Tell us the date, the type of event, and roughly the space you have. We confirm availability and lock it in.'],
      ['We set up', 'We arrive with the tent, simulator, projection, and everything else. You just provide a power outlet and room to swing.'],
      ['Everyone plays', 'Pick from over 30,000 courses. An operator stays for the entire booking to keep things running and help your guests.'],
      ['We pack down', 'When it wraps, we handle the full teardown. You enjoy your event from start to finish.'],
    ];
    return (
      <section className="band page">
        <div className="wrap">
          <Eyebrow>From hello to last putt</Eyebrow>
          <h2 className="display page-title reveal">How it works.</h2>
          <div className="steps">
            {steps.map(([t, d], i) => (
              <div className="step reveal" key={t} style={{ transitionDelay: `${i * 80}ms` }}>
                <div className="step-num">{String(i + 1).padStart(2, '0')}</div>
                <div>
                  <h3 className="step-title">{t}</h3>
                  <p className="muted">{d}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="need reveal">
            <span className="eyebrow">All you provide</span>
            <p className="body-lg" style={{ margin: '0.5rem 0 0' }}>A power outlet and enough space for the setup. That's the whole list.</p>
          </div>
        </div>
      </section>
    );
  };

  const Pricing = () => {
    const tiers = [
      ['2 Hours', '$500', 'Minimum booking', false],
      ['4 Hours', '$850', 'Most popular', true],
      ['Full Day', '$1,000', 'Up to 8 hours', false],
    ];
    return (
      <section className="band page">
        <div className="wrap">
          <Eyebrow>Simple, all in</Eyebrow>
          <h2 className="display page-title reveal">Pricing.</h2>
          <p className="sub reveal">Flat rates with everything included. Extra hours are $250 each.</p>
          <div className="grid-3 price-grid">
            {tiers.map(([n, p, note, feat], i) => (
              <div className={`price-card reveal${feat ? ' featured' : ''}`} key={n} style={{ transitionDelay: `${i * 70}ms` }}>
                {feat && <span className="tag">{note}</span>}
                <h3 className="price-name">{n}</h3>
                <div className="price-num">{p}</div>
                {!feat && <div className="price-note">{note}</div>}
                <button className={feat ? 'btn-primary full' : 'btn-ghost full'} onClick={() => go('contact')}>Request</button>
              </div>
            ))}
          </div>
          <div className="includes reveal">
            <span className="eyebrow">Every booking includes</span>
            <div className="includes-grid">
              {[
                'Pro launch monitor with HD projection',
                'Access to 30,000+ courses',
                'Tent and full setup, brought to you',
                'An operator on site the whole time',
                'Setup and teardown handled by us',
                'Friendly help for anyone new to it',
              ].map((x) => <div className="incl" key={x}><span className="check">&#10003;</span>{x}</div>)}
            </div>
          </div>
        </div>
      </section>
    );
  };

  const Gallery = () => (
    <section className="band page center">
      <div className="wrap narrow">
        <Eyebrow>The proof, soon</Eyebrow>
        <h2 className="display page-title reveal">Gallery.</h2>
        <div className="soon reveal">Coming Soon</div>
        <p className="sub reveal" style={{ marginTop: '1.5rem' }}>
          We're putting together photos and clips from real setups. Follow along on Instagram, and you'll see them first.
        </p>
        <a className="link-cta reveal" href="https://instagram.com/thetravellingtee.bc" target="_blank" rel="noopener noreferrer" style={{ marginTop: '1rem', display: 'inline-flex', gap: '.5rem', alignItems: 'center' }}>
          <InstaIcon size={18} /> @thetravellingtee.bc
        </a>
      </div>
    </section>
  );

  const FAQ = () => {
    const faqs = [
      ['How much space do you need?', 'Enough room for the tent and screen, plus space to swing comfortably. We confirm exact dimensions when you book.'],
      ['Do you provide the tent?', 'Yes. The tent and the full setup come with every booking.'],
      ['What do I need to provide?', 'A power outlet and enough space. That is the entire list.'],
      ['Is there a minimum booking?', 'Yes, the minimum is 2 hours.'],
      ['Does someone stay during the event?', 'Always. One of us is on site the whole time to run the simulator and help your guests.'],
      ['How many courses can we play?', 'You can choose from over 30,000 courses from around the world.'],
      ['Indoor or outdoor?', 'Both work, as long as there is enough space and access to power.'],
      ['What areas do you serve?', 'The Lower Mainland and Fraser Valley. A little outside that? Reach out, and we will see what we can do.'],
      ['How far ahead should I book?', 'The sooner the better, especially for weekends and busy seasons. Get in touch, and we will check availability.'],
      ['How do extra hours work?', 'If you want to go longer than your package, additional hours are $250 each.'],
    ];
    return (
      <section className="band page">
        <div className="wrap narrow">
          <Eyebrow>Good to know</Eyebrow>
          <h2 className="display page-title reveal">Questions, answered.</h2>
          <div className="faq-list reveal">
            {faqs.map(([q, a], i) => (
              <div className={`faq-item${openFaq === i ? ' open' : ''}`} key={i}>
                <button className="faq-q" onClick={() => setOpenFaq(openFaq === i ? -1 : i)}>
                  <span>{q}</span>
                  <span className="faq-plus">{openFaq === i ? '\u2212' : '+'}</span>
                </button>
                <div className="faq-a"><p className="muted" style={{ margin: 0 }}>{a}</p></div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  };

  const Contact = () => (
    <section className="band page">
      <div className="wrap narrow">
        <Eyebrow>Let's get it on the calendar</Eyebrow>
        <h2 className="display page-title reveal">Get in touch.</h2>
        <p className="sub reveal">Tell us about your event, and we'll come back with availability.</p>
        <div className="form reveal">
          {[['name', 'Your name', 'text'], ['email', 'Email', 'email'], ['phone', 'Phone', 'tel'], ['eventType', 'Type of event', 'text'], ['date', 'Preferred date', 'text']].map(([name, ph, type]) => (
            <input key={name} className="field" name={name} type={type} value={form[name]} onChange={handleChange} placeholder={ph} />
          ))}
          <textarea className="field" name="message" value={form.message} onChange={handleChange} rows={4} placeholder="Number of guests, location, anything else we should know" />
          <button className="btn-primary full" onClick={handleSubmit}>Request Booking</button>
          {formStatus && <p className="form-status">{formStatus}</p>}
        </div>
        <div className="contact-direct reveal">
          <a href="mailto:info@thetravellingtee.com"><span className="eyebrow">Email</span>info@thetravellingtee.com</a>
          <a href="tel:+17785127900"><span className="eyebrow">Phone</span>+1 (778) 512-7900</a>
          <a href="tel:+17785398700"><span className="eyebrow">Phone</span>+1 (778) 539-8700</a>
          <a href="https://instagram.com/thetravellingtee.bc" target="_blank" rel="noopener noreferrer"><span className="eyebrow">Instagram</span>@thetravellingtee.bc</a>
        </div>
      </div>
    </section>
  );

  return (
    <div ref={rootRef} className="tt-root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        .tt-root {
          --ink:#0A0E0B; --panel:#0F1611; --raised:#16201A;
          --green:#22c55e; --green-deep:#16A34A;
          --cream:#F3F1E9; --body:#B8BDB4; --muted:#828A80; --brass:#C9A24B;
          --line:rgba(243,241,233,0.08);
          background:var(--ink); color:var(--body);
          font-family:'Outfit',sans-serif; min-height:100vh; overflow-x:hidden;
        }
        .tt-root * { box-sizing:border-box; }
        .display { font-family:'Playfair Display',serif; color:var(--cream); letter-spacing:-0.5px; line-height:1.05; font-weight:700; }
        .ital { font-style:italic; color:var(--green); font-weight:600; }
        .wrap { max-width:1140px; margin:0 auto; padding:0 1.75rem; }
        .narrow { max-width:760px; }
        .eyebrow { font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:3px; font-size:0.72rem; color:var(--brass); margin-bottom:1rem; }
        .muted { color:var(--muted); line-height:1.7; font-size:0.97rem; }
        .body-lg { color:var(--body); line-height:1.8; font-size:1.12rem; }
        .sub { color:var(--muted); font-size:1.05rem; max-width:560px; margin:0 0 2.5rem; }

        /* Reveal */
        .reveal { opacity:0; transform:translateY(22px); transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
        .reveal.in { opacity:1; transform:none; }

        /* Header */
        .hdr { position:sticky; top:0; z-index:200; background:rgba(10,14,11,0.82); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); }
        .hdr-in { display:flex; align-items:center; justify-content:space-between; padding:1.1rem 0; }
        .brand { cursor:pointer; display:flex; align-items:center; gap:0.6rem; }
        .brand-mark { height:36px; width:auto; display:block; }
        .brand-word { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.2rem; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; }
        .hero-logo { width:min(330px,78vw); height:auto; display:block; margin:0 0 1.9rem; }
        .brand h1 { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.35rem; margin:0; font-weight:700; letter-spacing:-0.3px; }
        .brand p { font-family:'Space Mono',monospace; font-size:0.62rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin:.15rem 0 0; }
        .nav { display:flex; align-items:center; gap:1.6rem; }
        .nav-link { background:none; border:none; cursor:pointer; font-size:0.92rem; font-weight:500; color:var(--muted); transition:color .25s; font-family:'Outfit',sans-serif; }
        .nav-link:hover { color:var(--cream); }
        .nav-link.active { color:var(--green); }
        .insta-btn { color:var(--muted); display:flex; transition:color .25s; }
        .insta-btn:hover { color:var(--green); }
        .burger { display:none; background:none; border:none; color:var(--cream); cursor:pointer; font-size:1.5rem; }
        .mobile-nav { display:none; }

        /* Buttons */
        .btn-primary { background:var(--green); color:#06210F; border:none; padding:0.95rem 2rem; border-radius:7px; font-size:1rem; font-weight:600; cursor:pointer; font-family:'Outfit',sans-serif; transition:transform .2s, box-shadow .2s; box-shadow:0 0 0 rgba(34,197,94,0); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 14px 34px rgba(34,197,94,0.22); }
        .btn-ghost { background:transparent; color:var(--cream); border:1px solid var(--line); padding:0.95rem 1.8rem; border-radius:7px; font-size:1rem; font-weight:500; cursor:pointer; font-family:'Outfit',sans-serif; transition:border-color .2s, color .2s; }
        .btn-ghost:hover { border-color:var(--green); color:var(--green); }
        .full { width:100%; }

        /* Hero */
        .hero { position:relative; padding:7.5rem 0 5.5rem; overflow:hidden; }
        .hero-glow { position:absolute; inset:0; background:
          radial-gradient(60% 55% at 50% 0%, rgba(34,197,94,0.16), transparent 70%),
          radial-gradient(40% 40% at 85% 30%, rgba(201,162,75,0.08), transparent 70%);
          pointer-events:none; }
        .hero-inner { position:relative; }
        .hero .display { font-size:clamp(2.6rem,6.5vw,5rem); margin:0.4rem 0 1.6rem; }
        .lead { font-size:1.2rem; color:var(--body); line-height:1.7; max-width:620px; margin:0 0 2.4rem; }
        .hero-cta { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:3.5rem; }
        .readout { display:flex; gap:2.5rem; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:2rem; }
        .stat-num { font-family:'Playfair Display',serif; color:var(--cream); font-size:2.1rem; font-weight:700; }
        .stat-label { font-family:'Space Mono',monospace; font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-top:.35rem; }

        /* Bands */
        .band { padding:5.5rem 0; border-top:1px solid var(--line); }
        .band-turf { background:linear-gradient(180deg, var(--panel), var(--ink)); }
        .page { min-height:72vh; }
        .sec-title { font-size:clamp(1.9rem,3.8vw,2.8rem); margin:0 0 2.8rem; }
        .page-title { font-size:clamp(2.1rem,4.5vw,3.2rem); margin:0 0 0.6rem; }
        .center { text-align:center; }

        .split { display:grid; grid-template-columns:1fr 1fr; gap:3.5rem; align-items:start; }

        /* Cards */
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:1.25rem; }
        .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; }
        .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:1.9rem 1.6rem; transition:border-color .3s, transform .3s; }
        .card:hover { border-color:rgba(34,197,94,0.4); transform:translateY(-4px); }
        .card-index { font-family:'Space Mono',monospace; color:var(--brass); font-size:0.8rem; letter-spacing:1px; margin-bottom:1rem; }
        .card-title { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.2rem; margin:0 0 .6rem; font-weight:600; }

        /* Events */
        .event-card { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:2.2rem 1.8rem; transition:border-color .3s, transform .3s; display:flex; flex-direction:column; }
        .event-card:hover { border-color:rgba(34,197,94,0.45); transform:translateY(-5px); }
        .event-card.feat { background:linear-gradient(160deg, var(--raised), var(--panel)); border-color:rgba(34,197,94,0.35); }
        .event-title { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.35rem; margin:0 0 .7rem; font-weight:600; }
        .tag { display:inline-block; font-family:'Space Mono',monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:2px; color:#06210F; background:var(--brass); padding:.3rem .7rem; border-radius:4px; margin-bottom:1rem; align-self:flex-start; }
        .link-cta { margin-top:auto; padding-top:1.4rem; background:none; border:none; color:var(--green); font-family:'Outfit',sans-serif; font-weight:600; font-size:0.95rem; cursor:pointer; text-align:left; transition:gap .2s; }
        .link-cta:hover { color:var(--green-deep); }

        /* How */
        .steps { display:grid; grid-template-columns:1fr 1fr; gap:2.5rem 3rem; margin-top:2.5rem; }
        .step { display:flex; gap:1.4rem; align-items:flex-start; }
        .step-num { font-family:'Playfair Display',serif; font-style:italic; font-size:2.4rem; color:var(--green); line-height:1; min-width:2.6rem; }
        .step-title { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.3rem; margin:0 0 .5rem; font-weight:600; }
        .need { margin-top:3.5rem; padding:2rem 2.2rem; border:1px dashed var(--line); border-radius:12px; background:var(--panel); }

        /* Pricing */
        .price-grid { margin-bottom:2.5rem; }
        .price-card { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:2.6rem 2rem 2.2rem; text-align:center; transition:transform .3s, border-color .3s; display:flex; flex-direction:column; align-items:center; }
        .price-card:hover { transform:translateY(-4px); }
        .price-card.featured { background:linear-gradient(170deg, var(--raised), var(--panel)); border:1.5px solid var(--green); box-shadow:0 24px 60px rgba(34,197,94,0.12); }
        .price-name { font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:2px; font-size:0.82rem; color:var(--muted); margin:0 0 .7rem; }
        .price-num { font-family:'Playfair Display',serif; color:var(--cream); font-size:3rem; font-weight:700; margin:0 0 .4rem; }
        .price-note { color:var(--muted); font-size:0.85rem; margin-bottom:1.6rem; }
        .price-card .btn-primary, .price-card .btn-ghost { margin-top:auto; }
        .price-card.featured .price-num { color:var(--green); }
        .includes { border:1px solid var(--line); border-radius:14px; padding:2.4rem; background:var(--panel); }
        .includes-grid { display:grid; grid-template-columns:1fr 1fr; gap:.9rem 2rem; margin-top:1.2rem; }
        .incl { color:var(--body); display:flex; align-items:center; gap:.7rem; font-size:0.97rem; }
        .check { color:var(--green); font-weight:700; }

        /* Gallery */
        .soon { display:inline-block; margin-top:1.5rem; font-family:'Space Mono',monospace; letter-spacing:2px; text-transform:uppercase; font-size:0.8rem; color:var(--green); border:1px solid var(--green); border-radius:999px; padding:.6rem 1.6rem; }

        /* FAQ */
        .faq-list { margin-top:2rem; }
        .faq-item { border-bottom:1px solid var(--line); }
        .faq-q { width:100%; background:none; border:none; cursor:pointer; color:var(--cream); font-family:'Outfit',sans-serif; font-size:1.08rem; font-weight:500; padding:1.35rem 0; display:flex; justify-content:space-between; align-items:center; gap:1rem; text-align:left; }
        .faq-plus { color:var(--green); font-size:1.5rem; line-height:1; min-width:1.2rem; text-align:center; }
        .faq-a { max-height:0; overflow:hidden; transition:max-height .35s ease, padding .35s ease; }
        .faq-item.open .faq-a { max-height:420px; padding:0 0 1.35rem; }

        /* Contact */
        .form { display:flex; flex-direction:column; gap:.9rem; margin-top:1rem; }
        .field { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:.95rem 1.05rem; color:var(--cream); font-size:1rem; font-family:'Outfit',sans-serif; transition:border-color .2s; }
        .field::placeholder { color:var(--muted); }
        .field:focus { outline:none; border-color:var(--green); }
        textarea.field { resize:vertical; }
        .form-status { text-align:center; color:var(--body); margin:.6rem 0 0; }
        .contact-direct { display:flex; gap:2.5rem; flex-wrap:wrap; margin-top:3rem; padding-top:2.5rem; border-top:1px solid var(--line); }
        .contact-direct a { color:var(--cream); text-decoration:none; font-size:1.02rem; display:flex; flex-direction:column; gap:.4rem; transition:color .2s; }
        .contact-direct a:hover { color:var(--green); }
        .contact-direct .eyebrow { margin:0; }

        /* Footer */
        .ft { border-top:1px solid var(--green); background:var(--panel); padding:3rem 0 2.5rem; text-align:center; }
        .ft-brand { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.4rem; margin:0 0 1rem; }
        .ft-row { color:var(--muted); font-size:0.88rem; margin:.4rem 0; }
        .ft-diamond { color:var(--brass); }

        @media (max-width:880px) {
          .wrap { padding:0 1.4rem; }
          .grid-4 { grid-template-columns:1fr 1fr; }
          .grid-3 { grid-template-columns:1fr; }
          .split, .steps { grid-template-columns:1fr; gap:2rem; }
          .includes-grid { grid-template-columns:1fr; }
          .nav { display:none; }
          .burger { display:block; }
          .mobile-nav.open { display:flex; flex-direction:column; gap:.4rem; padding:.5rem 0 1.2rem; }
          .mobile-nav .nav-link { padding:.7rem 0; font-size:1.05rem; border-bottom:1px solid var(--line); }
          .band { padding:4rem 0; }
          .hero { padding:5rem 0 4rem; }
        }
        @media (max-width:560px) {
          .wrap { padding:0 1.2rem; }
          .brand-word { font-size:1.02rem; }
          .brand-mark { height:32px; }
          .grid-4 { grid-template-columns:1fr; }
          .hero { padding:4rem 0 3.5rem; }
          .hero .display { font-size:clamp(2rem,8.5vw,2.8rem); }
          .lead { font-size:1.05rem; }
          .hero-logo { width:min(300px,75vw); margin-bottom:1.4rem; }
          .readout { gap:1.3rem 1.9rem; padding-top:1.6rem; }
          .stat-num { font-size:1.7rem; }
          .hero-cta { flex-direction:column; align-items:stretch; gap:.8rem; }
          .hero-cta .btn-primary, .hero-cta .btn-ghost { width:100%; text-align:center; }
          .band { padding:3.5rem 0; }
          .sec-title { font-size:clamp(1.7rem,6vw,2.2rem); margin-bottom:2rem; }
          .page-title { font-size:clamp(1.9rem,7vw,2.4rem); }
          .card, .event-card { padding:1.7rem 1.4rem; }
          .price-card { padding:2rem 1.4rem 1.8rem; }
          .includes, .need { padding:1.8rem 1.4rem; }
          .contact-direct { flex-direction:column; gap:1.4rem; }
          .body-lg { font-size:1.05rem; }
          .ft-row { font-size:0.82rem; }
        }
        @media (prefers-reduced-motion:reduce) {
          .reveal { opacity:1 !important; transform:none !important; transition:none !important; }
          .btn-primary:hover, .card:hover, .event-card:hover, .price-card:hover { transform:none; }
          html { scroll-behavior:auto; }
        }
      `}</style>

      <header className="hdr">
        <div className="wrap hdr-in">
          <div className="brand" onClick={() => go('home')}>
            <img src={PIN} alt="" className="brand-mark" />
            <span className="brand-word">The Travelling Tee</span>
          </div>
          <nav className="nav">
            {nav.map((n) => (
              <button key={n.id} className={`nav-link${activeTab === n.id ? ' active' : ''}`} onClick={() => go(n.id)}>{n.label}</button>
            ))}
            <a className="insta-btn" href="https://instagram.com/thetravellingtee.bc" target="_blank" rel="noopener noreferrer"><InstaIcon /></a>
          </nav>
          <button className="burger" onClick={() => setMenuOpen(!menuOpen)}>{menuOpen ? '\u2715' : '\u2630'}</button>
        </div>
        <div className={`wrap mobile-nav${menuOpen ? ' open' : ''}`}>
          {nav.map((n) => (
            <button key={n.id} className={`nav-link${activeTab === n.id ? ' active' : ''}`} onClick={() => go(n.id)}>{n.label}</button>
          ))}
        </div>
      </header>

      {activeTab === 'home' && Home()}
      {activeTab === 'events' && Events()}
      {activeTab === 'how' && How()}
      {activeTab === 'pricing' && Pricing()}
      {activeTab === 'gallery' && Gallery()}
      {activeTab === 'faq' && FAQ()}
      {activeTab === 'contact' && Contact()}

      <footer className="ft">
        <div className="wrap">
          <p className="ft-brand">The Travelling Tee</p>
          <p className="ft-row"><span className="ft-diamond">&#9670;</span> Mobile Golf Simulator &middot; Lower Mainland &amp; Fraser Valley <span className="ft-diamond">&#9670;</span></p>
          <p className="ft-row">info@thetravellingtee.com &middot; (778) 512-7900 &middot; (778) 539-8700</p>
          <p className="ft-row" style={{ marginTop: '1.2rem' }}>&copy; 2026 The Travelling Tee. All rights reserved.</p>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TravellingTee />);
</script>
</body>
