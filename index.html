function TravellingTee() {
  const [activeTab, setActiveTab] = useState('home');
  const [openFaq, setOpenFaq] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [formStatus, setFormStatus] = useState('');
  const [form, setForm] = useState({ name: '', email: '', phone: '', eventType: '', date: '', message: '' });
  const rootRef = useRef(null);

  const nav = [
    { id: 'home', label: 'Home' },
    { id: 'events', label: 'Events' },
    { id: 'how', label: 'How It Works' },
    { id: 'pricing', label: 'Pricing' },
    { id: 'gallery', label: 'Gallery' },
    { id: 'faq', label: 'FAQ' },
    { id: 'contact', label: 'Contact' },
  ];

  const go = (id) => { setActiveTab(id); setMenuOpen(false); window.scrollTo({ top: 0, behavior: 'smooth' }); };

        .form-status { text-align:center; color:var(--body); margin:.6rem 0 0; }
        .contact-direct { display:flex; gap:2.5rem; flex-wrap:wrap; margin-top:3rem; padding-top:2.5rem; border-top:1px solid var(--line); }
        .contact-direct a { color:var(--cream); text-decoration:none; font-size:1.02rem; display:flex; flex-direction:column; gap:.4rem; transition:color .2s; }
        .contact-direct a:hover { color:var(--green); }
        .contact-direct .eyebrow { margin:0; }

        /* Footer */
        .ft { border-top:1px solid var(--green); background:var(--panel); padding:3rem 0 2.5rem; text-align:center; }
        .ft-brand { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.4rem; margin:0 0 1rem; }
        .ft-row { color:var(--muted); font-size:0.88rem; margin:.4rem 0; }
        .ft-diamond { color:var(--brass); }

        @media (max-width:880px) {
          .wrap { padding:0 1.4rem; }
          .grid-4 { grid-template-columns:1fr 1fr; }
          .grid-3 { grid-template-columns:1fr; }
          .split, .steps { grid-template-columns:1fr; gap:2rem; }
          .includes-grid { grid-template-columns:1fr; }
          .nav { display:none; }
          .burger { display:block; }
          .mobile-nav.open { display:flex; flex-direction:column; gap:.4rem; padding:.5rem 0 1.2rem; }
          .mobile-nav .nav-link { padding:.7rem 0; font-size:1.05rem; border-bottom:1px solid var(--line); }
          .band { padding:4rem 0; }
          .hero { padding:5rem 0 4rem; }
        }
        @media (max-width:560px) {
          .wrap { padding:0 1.2rem; }
          .hdr-in { padding:1.35rem 0; }
          .brand-word { font-size:1.18rem; }
          .brand-mark { height:42px; }
          .grid-4 { grid-template-columns:1fr; }
          .hero { padding:4rem 0 3.5rem; }
          .hero .display { font-size:clamp(2rem,8.5vw,2.8rem); }
          .lead { font-size:1.05rem; }
          .readout { gap:1.3rem 1.9rem; padding-top:1.6rem; }
          .stat-num { font-size:1.7rem; }
          .hero-cta { flex-direction:column; align-items:stretch; gap:.8rem; }
          .hero-cta .btn-primary, .hero-cta .btn-ghost { width:100%; text-align:center; }
          .band { padding:3.5rem 0; }
          .sec-title { font-size:clamp(1.7rem,6vw,2.2rem); margin-bottom:2rem; }
          .page-title { font-size:clamp(1.9rem,7vw,2.4rem); }
          .card, .event-card { padding:1.7rem 1.4rem; }
          .price-card { padding:2rem 1.4rem 1.8rem; }
          .includes, .need { padding:1.8rem 1.4rem; }
          .contact-direct { flex-direction:column; gap:1.4rem; }
          .body-lg { font-size:1.05rem; }
          .ft-row { font-size:0.82rem; }
        }
        @media (prefers-reduced-motion:reduce) {
          .reveal { opacity:1 !important; transform:none !important; transition:none !important; }
          .btn-primary:hover, .card:hover, .event-card:hover, .price-card:hover { transform:none; }
          html { scroll-behavior:auto; }
        }
      `}</style>

      <header className="hdr">
        <div className="wrap hdr-in">
          <div className="brand" onClick={() => go('home')}>
            <img src={PIN} alt="" className="brand-mark" />
            <span className="brand-word">The Travelling Tee</span>
          </div>
          <nav className="nav">
            {nav.map((n) => (
              <button key={n.id} className={`nav-link${activeTab === n.id ? ' active' : ''}`} onClick={() => go(n.id)}>{n.label}</button>
            ))}
            <a className="insta-btn" href="https://instagram.com/thetravellingtee.bc" target="_blank" rel="noopener noreferrer"><InstaIcon /></a>
          </nav>
          <button className="burger" onClick={() => setMenuOpen(!menuOpen)}>{menuOpen ? '\u2715' : '\u2630'}</button>
        </div>
        <div className={`wrap mobile-nav${menuOpen ? ' open' : ''}`}>
          {nav.map((n) => (
            <button key={n.id} className={`nav-link${activeTab === n.id ? ' active' : ''}`} onClick={() => go(n.id)}>{n.label}</button>
          ))}
        </div>
      </header>

      {activeTab === 'home' && Home()}
      {activeTab === 'events' && Events()}
      {activeTab === 'how' && How()}
      {activeTab === 'pricing' && Pricing()}
      {activeTab === 'gallery' && Gallery()}
      {activeTab === 'faq' && FAQ()}
      {activeTab === 'contact' && Contact()}

      <footer className="ft">
        <div className="wrap">
          <p className="ft-brand">The Travelling Tee</p>
          <p className="ft-row"><span className="ft-diamond">&#9670;</span> Mobile Golf Simulator &middot; Lower Mainland &amp; Fraser Valley <span className="ft-diamond">&#9670;</span></p>
          <p className="ft-row">info@thetravellingtee.com &middot; (778) 539-8700</p>
          <p className="ft-row" style={{ marginTop: '1.2rem' }}>&copy; 2026 The Travelling Tee. All rights reserved.</p>
        </div>
      </footer>
    </div>
  );
}

    root.render(<TravellingTee />);
  </script>
